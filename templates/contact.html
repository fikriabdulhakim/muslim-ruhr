{% extends 'base.html' %}
{% block content %}
<div class="container py-5">
<h1>Contact</h1>
{% if sent %}
<div class="alert alert-success">Message sent successfully (demo only).</div>
{% endif %}
<form method="post">{% csrf_token %}
<input class="form-control mb-3" name="name" placeholder="Your Name">
<input class="form-control mb-3" name="email" placeholder="Email">
<textarea class="form-control mb-3" name="message" rows="5" placeholder="Message"></textarea>
<button class="btn btn-primary">Send</button>
</form>
</div>
{% endblock %}
