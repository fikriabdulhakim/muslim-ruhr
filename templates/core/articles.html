{% extends 'core/base.html' %}
{% block content %}
<div class="container py-5">
  <h1>Articles</h1>
  {% for article in articles %}
    <div class="mb-4">
      <h3><a href="/articles/{{ article.slug }}/">{{ article.title }}</a></h3>
      <p>{{ article.excerpt }}</p>
    </div>
  {% empty %}
    <p>No articles available.</p>
  {% endfor %}
</div>
{% endblock %}
